<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio - Saga Gourmet</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout-base.css">
    <style>
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        .card-item {
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(80, 45, 22, 0.1);
            border: 2px solid #f5ebe0;
            text-align: center;
            transition: transform 0.2s;
        }

        .card-item:hover { transform: translateY(-5px); }

        .card-item img {
            width: 100%;
            max-width: 180px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }

        .card-item h3 {
            font-family: 'Lilita One', cursive;
            color: #432818;
            font-size: 1.6rem;
            margin-bottom: 5px;
        }

        .card-item p {
            font-size: 0.9rem;
            color: #857366;
            margin-bottom: 20px;
            height: 40px;
        }

        .price-tag {
            font-family: 'Lilita One', cursive;
            color: #d62300;
            font-size: 1.8rem;
            display: block;
            margin-bottom: 15px;
        }

        /* Botão Adicionar BK */
        .btn-add {
            background: #ffb703;
            color: #2b1a10;
            font-family: 'Lilita One', cursive;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 6px 0px #cc9200;
            width: 100%;
            transition: all 0.1s;
        }

        .btn-add:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #cc9200;
        }
    </style>
</head>
<body style="background-color: #f5ebe0;">
    <header style="background: #d62300; padding: 20px; text-align: center; border-bottom: 6px solid #ffb703;">
        <h1 style="font-family: 'Lilita One'; color: white; margin: 0; font-size: 2.5rem;">SAGA GOURMET</h1>
    </header>

    <main class="container p-4">
        <h2 id="titulo" style="text-align: center; margin-bottom: 40px;">Escolha seu Favorito</h2>

        <div class="menu-grid">
            <div class="card-item">
                <img src="https://vignette.wikia.nocookie.net/bk/images/5/5a/Whopper.png" alt="X-Frango">
                <h3>X-Frango</h3>
                <p>Pão com gergelim, frango empanado crocante, queijo e molho especial.</p>
                <span class="price-tag">R$ 20,90</span>
                <button class="btn-add">Adicionar</button>
            </div>

            <div class="card-item">
                <img src="https://vignette.wikia.nocookie.net/bk/images/5/5a/Whopper.png" alt="X-Salada">
                <h3>X-Salada</h3>
                <p>Hambúrguer grelhado no fogo, queijo, alface, tomate e maionese.</p>
                <span class="price-tag">R$ 21,90</span>
                <button class="btn-add">Adicionar</button>
            </div>
        </div>
    </main>

    <footer style="background: #2b1a10; color: white; padding: 20px; text-align: center; margin-top: 50px;">
        <p style="font-family: 'Lilita One'; color: #ffb703;">SAGA GOURMET - O SABOR DO FOGO</p>
    </footer>
</body>
</html>
