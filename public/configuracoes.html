<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configurações da Loja</title>
    <link rel="stylesheet" href="/layout-base.css">

    <style>
        :root {
            --cor-primaria: #d62300;
            --cor-secundaria: #2b1a10;
            --cor-destaque: #ffb703;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: var(--font-principal);
            background: var(--fundo);
            color: var(--texto);
        }

        .admin-page-header {
            background: var(--cor-secundaria);
            color: white;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .admin-page-header h1 {
            margin: 0;
        }

        .admin-page-header p {
            margin: 6px 0 0;
            opacity: 0.85;
        }

        .voltar {
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.35);
            padding: 10px 14px;
            border-radius: 14px;
            font-weight: bold;
        }

        .configuracoes-content {
            display: grid;
            grid-template-columns: 1.3fr 0.7fr;
            gap: 24px;
            align-items: start;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius-card);
            padding: 24px;
            box-shadow: var(--sombra);
        }

        h2 {
            margin-top: 0;
            color: var(--cor-secundaria);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .campo-cheio {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 14px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            font-size: 15px;
        }

        input:focus,
        textarea:focus {
            outline: 2px solid var(--cor-primaria);
            border-color: transparent;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: var(--cor-primaria);
            color: white;
            border: 0;
            border-radius: var(--radius-control);
            padding: 13px 18px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover,
        .voltar:hover,
        .preview-header a:hover {
            filter: brightness(0.95);
        }

        .input-com-botao {
            display: flex;
            gap: 8px;
        }

        .input-com-botao input {
            flex: 1;
        }

        .input-com-botao button {
            padding: 12px 14px;
            white-space: nowrap;
        }

        .acoes {
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .mensagem {
            font-weight: bold;
            color: #15803d;
        }

        .mensagem.erro {
            color: #b91c1c;
        }

        .preview {
            padding: 0;
            overflow: hidden;
            position: sticky;
            top: 24px;
        }

        .preview-header {
            padding: 18px 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .preview-header h2 {
            margin: 0;
        }

        .preview-header p {
            margin: 4px 0 0;
            color: #6b7280;
            font-size: 14px;
        }

        .preview-header a {
            background: var(--cor-primaria);
            color: white;
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 14px;
            font-weight: bold;
            white-space: nowrap;
        }

        #previewMesa {
            width: 100%;
            height: 720px;
            border: 0;
            display: block;
            background: var(--card);
        }

        @media (max-width: 900px) {
            .configuracoes-content {
                grid-template-columns: 1fr;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .preview {
                position: static;
            }

            #previewMesa {
                height: 620px;
            }

            .admin-page-header {
                padding: 20px;
            }
        }
    </style>
    <link rel="stylesheet" href="/theme.css">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">🍔</div>
                <h1 data-store-name>Lanchonete</h1>
            </div>

            <nav class="nav-menu">
                <a href="/" class="nav-item">
                    <span class="nav-item-icon">🏠</span>
                    <span>Início</span>
                </a>

                <a href="/balcao" class="nav-item">
                    <span class="nav-item-icon">💳</span>
                    <span>Balcão</span>
                </a>

                <a href="/cozinha" class="nav-item">
                    <span class="nav-item-icon">👨‍🍳</span>
                    <span>Cozinha</span>
                </a>

                <a href="/painel" class="nav-item">
                    <span class="nav-item-icon">📊</span>
                    <span>Painel</span>
                </a>

                <div class="nav-section-title">Gerenciamento</div>

                <a href="/manager" class="nav-item">
                    <span class="nav-item-icon">⚙️</span>
                    <span>Manager</span>
                </a>

                <a href="/manager/configuracoes" class="nav-item">
                    <span class="nav-item-icon">🎨</span>
                    <span>Configurações</span>
                </a>

                <a href="/manager/cardapio" class="nav-item">
                    <span class="nav-item-icon">📋</span>
                    <span>Cardápio</span>
                </a>
            </nav>
        </aside>


        <main class="main-content">
            <header class="top-bar">
                <div>
                    <h2 class="top-bar-title">Configurações da Loja</h2>
                    <p class="top-bar-subtitle">Personalize os dados e a aparência do sistema.</p>
                </div>
                <div class="top-bar-actions">
                    <a class="btn btn-primary" href="/manager">Manager</a>
                </div>
            </header>

            <div class="content-area configuracoes-content">
        <section class="card">
            <h2>Dados da loja</h2>

            <form id="formConfiguracoes">
                <div class="grid">
                    <div>
                        <label for="nomeFantasia">Nome fantasia</label>
                        <input id="nomeFantasia" placeholder="Ex: Lanchonete do João" />
                    </div>

                    <div>
                        <label for="razaoSocial">Razão social</label>
                        <input id="razaoSocial" placeholder="Ex: João Lanches LTDA" />
                    </div>

                    <div>
                        <label for="cnpj">CNPJ</label>
                        <div class="input-com-botao">
                            <input id="cnpj" placeholder="00.000.000/0001-00" maxlength="18" />
                            <button type="button" onclick="buscarCnpj()">Buscar</button>
                        </div>
                    </div>

                    <div>
                        <label for="telefone">Telefone</label>
                        <input id="telefone" placeholder="(47) 3333-3333" />
                    </div>

                    <div>
                        <label for="whatsapp">WhatsApp da loja</label>
                        <input id="whatsapp" placeholder="(47) 99999-9999" />
                    </div>

                    <div>
                        <label for="email">E-mail</label>
                        <input id="email" placeholder="contato@loja.com" />
                    </div>

                    <div class="campo-cheio">
                        <label for="endereco">Endereço</label>
                        <input id="endereco" placeholder="Rua Exemplo, 123 - Centro" />
                    </div>

                    <div>
                        <label for="cidade">Cidade</label>
                        <input id="cidade" placeholder="Joinville" />
                    </div>

                    <div>
                        <label for="estado">Estado</label>
                        <input id="estado" placeholder="SC" maxlength="2" />
                    </div>

                    <div class="campo-cheio">
                        <label for="logoUrl">URL da logo</label>
                        <input id="logoUrl" placeholder="Ex: https://site.com/logo.png ou /uploads/logo.png" />
                    </div>
                </div>

                <h2 style="margin-top: 32px;">Aparência</h2>

                <div class="grid">
                    <div>
                        <label for="corPrimaria">Cor primária</label>
                        <input id="corPrimaria" type="color" />
                    </div>

                    <div>
                        <label for="corSecundaria">Cor secundária</label>
                        <input id="corSecundaria" type="color" />
                    </div>

                    <div>
                        <label for="corDestaque">Cor de destaque</label>
                        <input id="corDestaque" type="color" />
                    </div>
                </div>

                <div class="acoes">
                    <button type="submit">Salvar configurações</button>
                    <span id="mensagem" class="mensagem"></span>
                </div>
            </form>
        </section>

        <aside class="card preview">
            <div class="preview-header">
                <div>
                    <h2>Prévia da mesa</h2>
                    <p>Visualização real da tela que ficará no tablet.</p>
                </div>

                <a href="/mesa/preview" target="_blank">Abrir maior</a>
            </div>

            <iframe id="previewMesa" src="/mesa/preview"></iframe>
        </aside>
    </main>

    <script>
        const form = document.getElementById("formConfiguracoes");
        const mensagem = document.getElementById("mensagem");

        const campos = {
            nomeFantasia: document.getElementById("nomeFantasia"),
            razaoSocial: document.getElementById("razaoSocial"),
            cnpj: document.getElementById("cnpj"),
            telefone: document.getElementById("telefone"),
            whatsapp: document.getElementById("whatsapp"),
            email: document.getElementById("email"),
            endereco: document.getElementById("endereco"),
            cidade: document.getElementById("cidade"),
            estado: document.getElementById("estado"),
            logoUrl: document.getElementById("logoUrl"),
            corPrimaria: document.getElementById("corPrimaria"),
            corSecundaria: document.getElementById("corSecundaria"),
            corDestaque: document.getElementById("corDestaque")
        };

        function mostrarMensagem(texto, tipo = "sucesso") {
            mensagem.innerText = texto;
            mensagem.classList.toggle("erro", tipo === "erro");
        }

        function limparMensagemDepois() {
            setTimeout(() => {
                mensagem.innerText = "";
                mensagem.classList.remove("erro");
            }, 3500);
        }

        function aplicarTema(tema) {
            document.documentElement.style.setProperty("--cor-primaria", tema.corPrimaria);
            document.documentElement.style.setProperty("--cor-secundaria", tema.corSecundaria);
            document.documentElement.style.setProperty("--cor-destaque", tema.corDestaque);
        }

        function atualizarPreview() {
            aplicarTema({
                corPrimaria: campos.corPrimaria.value,
                corSecundaria: campos.corSecundaria.value,
                corDestaque: campos.corDestaque.value
            });
        }

        function preencherSeVazio(campo, valor) {
            const valorAtual = campo.value.trim();

            if (!valorAtual && valor) {
                campo.value = valor;
            }
        }

        function formatarCnpj(valor) {
            const numeros = valor.replace(/\D/g, "").slice(0, 14);

            return numeros
                .replace(/^(\d{2})(\d)/, "$1.$2")
                .replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3")
                .replace(/\.(\d{3})(\d)/, ".$1/$2")
                .replace(/(\d{4})(\d)/, "$1-$2");
        }

        function limparCnpj(valor) {
            return String(valor || "").replace(/\D/g, "");
        }

        async function buscarCnpj() {
            const cnpj = limparCnpj(campos.cnpj.value);

            if (cnpj.length !== 14) {
                mostrarMensagem("Digite um CNPJ válido com 14 números.", "erro");
                return;
            }

            campos.cnpj.value = formatarCnpj(cnpj);
            mostrarMensagem("Buscando dados do CNPJ...");

            try {
                const resposta = await fetch(`/api/cnpj/${cnpj}`);
                const dados = await resposta.json();

                if (!dados.ok) {
                    mostrarMensagem(dados.mensagem || "Não foi possível consultar o CNPJ.", "erro");
                    return;
                }

                preencherSeVazio(campos.nomeFantasia, dados.loja.nomeFantasia);
                preencherSeVazio(campos.razaoSocial, dados.loja.razaoSocial);
                preencherSeVazio(campos.cnpj, formatarCnpj(dados.loja.cnpj || cnpj));
                preencherSeVazio(campos.telefone, dados.loja.telefone);
                preencherSeVazio(campos.email, dados.loja.email);
                preencherSeVazio(campos.endereco, dados.loja.endereco);
                preencherSeVazio(campos.cidade, dados.loja.cidade);
                preencherSeVazio(campos.estado, dados.loja.estado);

                campos.cnpj.value = formatarCnpj(campos.cnpj.value);

                atualizarPreview();
                mostrarMensagem("Dados encontrados. Campos vazios foram preenchidos. Revise e clique em salvar.");
            } catch (error) {
                console.error(error);
                mostrarMensagem("Erro ao buscar CNPJ. Verifique a internet.", "erro");
            }
        }

        async function carregarConfiguracoes() {
            const resposta = await fetch("/api/configuracoes");
            const config = await resposta.json();

            campos.nomeFantasia.value = config.loja.nomeFantasia || "";
            campos.razaoSocial.value = config.loja.razaoSocial || "";
            campos.cnpj.value = formatarCnpj(config.loja.cnpj || "");
            campos.telefone.value = config.loja.telefone || "";
            campos.whatsapp.value = config.loja.whatsapp || "";
            campos.email.value = config.loja.email || "";
            campos.endereco.value = config.loja.endereco || "";
            campos.cidade.value = config.loja.cidade || "";
            campos.estado.value = config.loja.estado || "";
            campos.logoUrl.value = config.loja.logoUrl || "";

            campos.corPrimaria.value = config.tema.corPrimaria || "#e11d48";
            campos.corSecundaria.value = config.tema.corSecundaria || "#111827";
            campos.corDestaque.value = config.tema.corDestaque || "#f59e0b";

            aplicarTema(config.tema);
            atualizarPreview();
        }

        function montarPayload() {
            return {
                loja: {
                    nomeFantasia: campos.nomeFantasia.value.trim(),
                    razaoSocial: campos.razaoSocial.value.trim(),
                    cnpj: limparCnpj(campos.cnpj.value),
                    telefone: campos.telefone.value.trim(),
                    whatsapp: campos.whatsapp.value.trim(),
                    email: campos.email.value.trim(),
                    endereco: campos.endereco.value.trim(),
                    cidade: campos.cidade.value.trim(),
                    estado: campos.estado.value.trim().toUpperCase(),
                    logoUrl: campos.logoUrl.value.trim()
                },
                tema: {
                    corPrimaria: campos.corPrimaria.value,
                    corSecundaria: campos.corSecundaria.value,
                    corDestaque: campos.corDestaque.value
                }
            };
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const resposta = await fetch("/api/configuracoes", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(montarPayload())
            });

            const dados = await resposta.json();

            if (!dados.ok) {
                mostrarMensagem(dados.mensagem || "Erro ao salvar configurações.", "erro");
                return;
            }

            campos.cnpj.value = formatarCnpj(campos.cnpj.value);

            mostrarMensagem(dados.mensagem || "Configurações salvas com sucesso!");

            document.getElementById("previewMesa").contentWindow.location.reload();

            limparMensagemDepois();
        });

        for (const campo of Object.values(campos)) {
            campo.addEventListener("input", atualizarPreview);
        }

        campos.cnpj.addEventListener("input", () => {
            campos.cnpj.value = formatarCnpj(campos.cnpj.value);
        });

        campos.estado.addEventListener("input", () => {
            campos.estado.value = campos.estado.value.toUpperCase();
        });

        carregarConfiguracoes();
    </script>
    <script src="/theme-loader.js"></script>
    <script src="/layout-shell.js"></script>
</body>

</html>
