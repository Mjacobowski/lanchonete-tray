name: CI - baseline
on:
  pull_request:
  push:
    branches:
      - delta/*
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Basic smoke checks
        run: |
          echo "Node: $(node -v)"
          echo "NPM: $(npm -v)"

      - name: Start server (web-only) and maybe check /health
        run: |
          # start server in background
          nohup node main.js --web-only > server.log 2>&1 &
          echo $! > server.pid
          # wait a bit for server to start
          for i in 1 2 3 4 5; do
            sleep 1
            if ss -ltn | grep -q ':3000'; then break; fi
          done
          # probe /health. If 200 -> success; if 404 or other -> note but do not fail the job
          STATUS=000
          if command -v curl >/dev/null 2>&1; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || true)
          fi
          if [ "$STATUS" = "200" ]; then
            echo "Health endpoint OK"
          else
            echo "Health endpoint not available or returned $STATUS (non-fatal for this baseline)"
          fi
        timeout-minutes: 5

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
            rm -f server.pid
          fi
